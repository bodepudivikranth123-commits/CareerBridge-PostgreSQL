<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Applications | CareerBridge</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>CareerBridge</h1>

<p>Campus Placement Management System</p>

</header>

<nav>

<a href="index.html">Home</a>
<a href="students.html">Students</a>
<a href="departments.html">Departments</a>
<a href="companies.html">Companies</a>
<a href="jobroles.html">Job Roles</a>
<a href="drives.html">Placement Drives</a>
<a class="active" href="applications.html">Applications</a>
<a href="offers.html">Offers</a>
<a href="reports.html">Reports</a>

</nav>

<main>

<section>

<h2>Application Management</h2>

<form id="applicationForm">

<div class="form-grid">

<div class="form-group">
<label>Student</label>

<select id="student">
<option>Rahul Sharma</option>
<option>Priya Reddy</option>
<option>Arjun Verma</option>
</select>

</div>

<div class="form-group">
<label>Job Role</label>

<select id="jobRole">
<option>Software Engineer - TCS</option>
<option>System Engineer - Infosys</option>
<option>Project Engineer - Wipro</option>
</select>

</div>

<div class="form-group">
<label>Application Date</label>
<input type="date" id="applicationDate">
</div>

<div class="form-group">
<label>Status</label>

<select id="status">

<option>Applied</option>

<option>Shortlisted</option>

<option>Interview</option>

<option>Selected</option>

<option>Rejected</option>

</select>

</div>

</div>

<div class="button-group">

<button type="button" id="addBtn">Add</button>

<button type="button" id="updateBtn">Update</button>

<button type="button" id="deleteBtn">Delete</button>

<button type="reset">Clear</button>

</div>

</form>

</section>

<section>

<h2>Search Application</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Student">

</div>

</section>

<section>

<h2>Application Records</h2>

<table id="applicationTable">

<thead>

<tr>

<th>ID</th>

<th>Student</th>

<th>Job Role</th>

<th>Application Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="applicationBody">

</tbody>

</table>

</section>

</main>

<footer>

<p>© 2026 CareerBridge</p>

</footer>

<script src="js/applications.js"></script>

</body>

</html>

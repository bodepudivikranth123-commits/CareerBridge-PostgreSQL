</head>

<body>

<header>

<h1>CareerBridge</h1>

<p>Campus Placement Management System</p>

</header>

<nav>

<main>

<section>

<h2>Job Role Management</h2>

<form id="jobRoleForm">

<div class="form-grid">

<div class="form-group">
<label>Role Name</label>
<input type="text" id="roleName" required>
</div>

<div class="form-group">
<label>Company</label>

<select id="company">

</select>

</div>

<div class="form-group">
<label>Salary (LPA)</label>
<input type="number" step="0.1" id="salary">
</div>

<div class="form-group">
<label>Minimum CGPA</label>
<input type="number" step="0.01" id="cgpa">
</div>

<div class="form-group">
<label>Vacancies</label>
<input type="number" id="vacancies">
</div>

</div>

<div class="button-group">

<button type="button" id="addBtn">Add</button>

<button type="button" id="updateBtn">Update</button>

<button type="button" id="deleteBtn">Delete</button>

<button type="reset">Clear</button>

</div>

</form>

</section>

<section>

<h2>Search Job Role</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Role">

</div>

</section>

<section>

<h2>Job Role Records</h2>

<table id="jobTable">

<thead>

<tr>

<th>ID</th>

<th>Role</th>

<th>Company</th>

<th>Salary</th>

<th>Minimum CGPA</th>

<th>Vacancies</th>

</tr>

</thead>

<tbody id="jobBody">

</tbody>
</table>

</section>

</main>

<footer>

<p>

</p>

</footer>

<script src="js/jobroles.js"></script>

</body>

</html>

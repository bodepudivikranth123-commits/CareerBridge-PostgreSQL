<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Placement Drives | CareerBridge</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>CareerBridge</h1>

<p>Campus Placement Management System</p>

</header>

<nav>

<a href="index.html">Home</a>
<a href="students.html">Students</a>
<a href="departments.html">Departments</a>
<a href="companies.html">Companies</a>
<a href="jobroles.html">Job Roles</a>
<a class="active" href="drives.html">Placement Drives</a>
<a href="applications.html">Applications</a>
<a href="offers.html">Offers</a>
<a href="reports.html">Reports</a>

</nav>

<main>

<section>

<h2>Placement Drive Management</h2>

<form id="driveForm">

<div class="form-grid">

<div class="form-group">
<label>Company</label>

<select id="company">
<option>TCS</option>
<option>Infosys</option>
<option>Wipro</option>
<option>Accenture</option>
<option>Cognizant</option>
<option>Capgemini</option>
<option>IBM</option>
<option>Deloitte</option>
</select>

</div>

<div class="form-group">
<label>Drive Date</label>
<input type="date" id="driveDate">
</div>

<div class="form-group">
<label>Venue</label>
<input type="text" id="venue">
</div>

<div class="form-group">
<label>Registration Deadline</label>
<input type="date" id="deadline">
</div>

<div class="form-group">
<label>Status</label>

<select id="status">

<option>Upcoming</option>

<option>Ongoing</option>

<option>Completed</option>

</select>

</div>

</div>

<div class="button-group">

<button type="button" id="addBtn">Add</button>

<button type="button" id="updateBtn">Update</button>

<button type="button" id="deleteBtn">Delete</button>

<button type="reset">Clear</button>

</div>

</form>

</section>

<section>

<h2>Search Placement Drive</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Company">

</div>

</section>

<section>

<h2>Placement Drive Records</h2>

<table id="driveTable">

<thead>

<tr>

<th>ID</th>

<th>Company</th>

<th>Drive Date</th>

<th>Venue</th>

<th>Deadline</th>

<th>Status</th>

</tr>

</thead>

<tbody id="driveBody">

</tbody>

</table>

</section>

</main>

<footer>

<p>© 2026 CareerBridge</p>

</footer>

<script src="js/drives.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students | CareerBridge</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <h1>CareerBridge</h1>

    <p>Campus Placement Management System</p>

</header>

<nav>

    <a href="index.html">Home</a>
    <a class="active" href="students.html">Students</a>
    <a href="departments.html">Departments</a>
    <a href="companies.html">Companies</a>
    <a href="jobroles.html">Job Roles</a>
    <a href="drives.html">Placement Drives</a>
    <a href="applications.html">Applications</a>
    <a href="offers.html">Offers</a>
    <a href="reports.html">Reports</a>

</nav>

<main>

<section>

<h2>Student Management</h2>

<form id="studentForm">

<div class="form-grid">

<div class="form-group">
<label>Student Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone" required>
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<div class="form-group">
<label>CGPA</label>
<input type="number" step="0.01" id="cgpa">
</div>

<div class="form-group">
<label>Department</label>
<select id="department">
<option>Computer Science</option>
<option>Information Technology</option>
<option>Electronics</option>
<option>Mechanical</option>
<option>Civil</option>
</select>
</div>

</div>

<div class="button-group">

<button type="button" id="addBtn">Add</button>

<button type="button" id="updateBtn">Update</button>

<button type="button" id="deleteBtn">Delete</button>

<button type="reset">Clear</button>

</div>

</form>

</section>

<section>

<h2>Search Student</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search by Student Name">

</div>

</section>

<section>

<h2>Student Records</h2>

<table id="studentTable">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Gender</th>

<th>CGPA</th>

<th>Department</th>

</tr>

</thead>

<tbody id="studentBody">

<!-- Students from Oracle Database will be loaded here -->

</tbody>

</table>

</section>

</main>

<footer>

<p>
© 2026 CareerBridge
</p>

</footer>

<script src="js/students.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies | CareerBridge</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>CareerBridge</h1>
    <p>Campus Placement Management System</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="students.html">Students</a>
    <a href="departments.html">Departments</a>
    <a class="active" href="companies.html">Companies</a>
    <a href="jobroles.html">Job Roles</a>
    <a href="drives.html">Placement Drives</a>
    <a href="applications.html">Applications</a>
    <a href="offers.html">Offers</a>
    <a href="reports.html">Reports</a>
</nav>

<main>

<section>

<h2>Company Management</h2>

<form id="companyForm">

<div class="form-grid">

<div class="form-group">
<label>Company Name</label>
<input type="text" id="companyName" required>
</div>

<div class="form-group">
<label>Location</label>
<input type="text" id="location" required>
</div>

<div class="form-group">
<label>Website</label>
<input type="text" id="website" required>
</div>

<div class="form-group">
<label>HR Email</label>
<input type="email" id="hrEmail" required>
</div>

</div>

<div class="button-group">

<button type="button" id="addBtn">Add</button>

<button type="button" id="updateBtn">Update</button>

<button type="button" id="deleteBtn">Delete</button>

<button type="reset">Clear</button>

</div>

</form>

</section>

<section>

<h2>Search Company</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Company">

</div>

</section>

<section>

<h2>Company Records</h2>

<table id="companyTable">

<thead>

<tr>

<th>ID</th>

<th>Company</th>

<th>Location</th>

<th>Website</th>

<th>HR Email</th>

</tr>

</thead>

<tbody id="companyBody">

</tbody>

</table>

</section>

</main>

<footer>

<p>© 2026 CareerBridge</p>

</footer>

<script src="js/companies.js"></script>

</body>

</html>
